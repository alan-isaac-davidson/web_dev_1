<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karunya Tech Symposium 2026 - Registration</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #2c3e50;
            text-align: center;
        }
        .banner {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
            object-fit: cover;
            height: 300px;
        }
        .media-section {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
        }
        video {
            width: 100%;
            max-width: 600px;
            border-radius: 8px;
            margin-top: 10px;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        label {
            font-weight: bold;
            color: #34495e;
        }
        input[type="text"], input[type="email"], input[type="date"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .file-upload {
            padding: 10px 0;
        }
        input[type="submit"] {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        input[type="submit"]:hover {
            background-color: #2471a3;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Tech Event Banner" class="banner">

    <h1>Tech Symposium 2026: AI & Cybersecurity</h1>
    <p style="text-align: center; color: #7f8c8d;">Join us for an immersive experience into the future of NLP, machine learning, and network security.</p>

    <div class="media-section">
        <h2>Event Teaser & Audio</h2>
        
        <label>Listen to our welcome message:</label>
        <audio controls>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <br><br>

        <label>Watch last year's highlights:</label><br>
        <video controls poster="https://images.unsplash.com/photo-1515187029135-18ee286d815b?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <hr style="border: 1px solid #ecf0f1; margin: 30px 0;">

    <h2>Participant Registration</h2>
    <form action="#" method="POST" enctype="multipart/form-data">
        
        <div>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
        </div>

        <div>
            <label for="regno">Register Number:</label>
            <input type="text" id="regno" name="regno" placeholder="e.g., URK23CS5083" required>
        </div>

        <div>
            <label for="email">College Email ID:</label>
            <input type="email" id="email" name="email" placeholder="name@college.edu" required>
        </div>

        <div>
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required>
        </div>

        <div>
            <label>Event Track Preference:</label>
            <div class="radio-group">
                <label><input type="radio" name="track" value="ai" required> Natural Language Processing</label>
                <label><input type="radio" name="track" value="cybersec"> Cyber Threat Hunting</label>
            </div>
        </div>

        <div>
            <label for="year">Current Year of Study:</label>
            <select id="year" name="year" required>
                <option value="">-- Select Year --</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd
